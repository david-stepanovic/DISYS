spring.application.name=energy-user

# This is a background service, not a web app -> do not start a web server
spring.main.web-application-type=none

# RabbitMQ connection (matches docker/docker-compose.yml)
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
